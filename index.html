<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Car Racing Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #222;
      font-family: Arial, sans-serif;
      overflow: hidden;
      text-align: center;
      color: white;
    }

    h1 {
      margin: 15px 0;
    }

    .game-container {
      position: relative;
      width: 360px;
      height: 600px;
      margin: 10px auto;
      background: #444;
      overflow: hidden;
      border: 4px solid white;
      border-radius: 10px;
    }

    .road {
      position: absolute;
      width: 100%;
      height: 100%;
      background: #555;
    }

    .line {
      position: absolute;
      width: 10px;
      height: 80px;
      background: white;
      left: 50%;
      transform: translateX(-50%);
    }

    .player-car {
      position: absolute;
      width: 50px;
      height: 90px;
      background: red;
      bottom: 20px;
      left: 155px;
      border-radius: 10px;
    }

    .enemy-car {
      position: absolute;
      width: 50px;
      height: 90px;
      background: yellow;
      top: -100px;
      border-radius: 10px;
    }

    .score-board {
      font-size: 22px;
      margin: 10px 0;
    }

    .controls {
      margin-top: 15px;
    }

    button {
      padding: 12px 18px;
      margin: 5px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .start-btn {
      background: limegreen;
      color: white;
    }

    .left-btn, .right-btn {
      background: dodgerblue;
      color: white;
      width: 100px;
    }

    .game-over {
      position: absolute;
      top: 45%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.8);
      padding: 20px;
      border-radius: 10px;
      display: none;
    }
  </style>
</head>
<body>
  <h1>Car Racing Game</h1>
  <div class="score-board">Score: <span id="score">0</span></div>

  <div class="game-container" id="game">
    <div class="road" id="road"></div>
    <div class="player-car" id="player"></div>
    <div class="game-over" id="gameOver">
      <h2>Game Over</h2>
      <p>Your Score: <span id="finalScore">0</span></p>
    </div>
  </div>

  <div class="controls">
    <button class="start-btn" onclick="startGame()">Start Game</button><br>
    <button class="left-btn" onclick="moveLeft()">Left</button>
    <button class="right-btn" onclick="moveRight()">Right</button>
  </div>

  <script>
    const game = document.getElementById("game");
    const player = document.getElementById("player");
    const scoreDisplay = document.getElementById("score");
    const gameOverBox = document.getElementById("gameOver");
    const finalScore = document.getElementById("finalScore");

    let playerX = 155;
    let score = 0;
    let gameRunning = false;
    let enemyCars = [];
    let roadLines = [];
    let animationId;
    let speed = 5;

    function createRoadLines() {
      for (let i = 0; i < 6; i++) {
        const line = document.createElement("div");
        line.classList.add("line");
        line.style.top = i * 120 + "px";
        game.appendChild(line);
        roadLines.push(line);
      }
    }

    function createEnemyCar() {
      const enemy = document.createElement("div");
      enemy.classList.add("enemy-car");
      enemy.style.left = Math.floor(Math.random() * 6) * 50 + 30 + "px";
      enemy.style.top = "-100px";
      game.appendChild(enemy);
      enemyCars.push(enemy);
    }

    function moveRoadLines() {
      roadLines.forEach((line) => {
        let top = parseInt(line.style.top);
        top += speed;
        if (top > 600) {
          top = -80;
        }
        line.style.top = top + "px";
      });
    }

    function moveEnemyCars() {
      for (let i = 0; i < enemyCars.length; i++) {
        let enemy = enemyCars[i];
        let top = parseInt(enemy.style.top);
        top += speed;
        enemy.style.top = top + "px";

        if (checkCollision(player, enemy)) {
          endGame();
          return;
        }

        if (top > 600) {
          enemy.remove();
          enemyCars.splice(i, 1);
          i--;
          score++;
          scoreDisplay.innerText = score;

          if (score % 5 === 0) {
            speed += 1;
          }

          createEnemyCar();
        }
      }
    }

    function checkCollision(a, b) {
      const aRect = a.getBoundingClientRect();
      const bRect = b.getBoundingClientRect();

      return !(
        aRect.bottom < bRect.top ||
        aRect.top > bRect.bottom ||
        aRect.right < bRect.left ||
        aRect.left > bRect.right
      );
    }

    function gameLoop() {
      if (!gameRunning) return;

      moveRoadLines();
      moveEnemyCars();
      animationId = requestAnimationFrame(gameLoop);
    }

    function startGame() {
      cancelAnimationFrame(animationId);

      document.querySelectorAll(".enemy-car").forEach(car => car.remove());
      document.querySelectorAll(".line").forEach(line => line.remove());

      enemyCars = [];
      roadLines = [];
      score = 0;
      speed = 5;
      playerX = 155;
      player.style.left = playerX + "px";
      scoreDisplay.innerText = score;
      gameOverBox.style.display = "none";

      createRoadLines();
      createEnemyCar();
      createEnemyCar();

      gameRunning = true;
      gameLoop();
    }

    function endGame() {
      gameRunning = false;
      finalScore.innerText = score;
      gameOverBox.style.display = "block";
    }

    function moveLeft() {
      if (playerX > 30) {
        playerX -= 25;
        player.style.left = playerX + "px";
      }
    }

    function moveRight() {
      if (playerX < 280) {
        playerX += 25;
        player.style.left = playerX + "px";
      }
    }

    document.addEventListener("keydown", (e) => {
      if (!gameRunning) return;
      if (e.key === "ArrowLeft") moveLeft();
      if (e.key === "ArrowRight") moveRight();
    });
  </script>
</body>
</html>
