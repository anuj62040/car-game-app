<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Car Game Login</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      text-align: center;
    }

    .login-box {
      margin: 30px auto 10px;
      width: 320px;
      background: #1e1e1e;
      padding: 20px;
      border-radius: 14px;
      box-shadow: 0 0 15px rgba(0,0,0,0.4);
    }

    .login-box h2 {
      margin-bottom: 15px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
    }

    .google-btn {
      background: #ffffff;
      color: #222;
    }

    .facebook-btn {
      background: #1877f2;
      color: white;
    }

    .logout-btn {
      background: #ff4d4d;
      color: white;
    }

    #userInfo {
      margin-top: 12px;
      font-size: 15px;
      color: #90ee90;
    }

    #gameSection {
      display: none;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <div class="login-box">
    <h2>Login to Play</h2>
    <button class="google-btn" onclick="signInWithGoogle()">Login with Google</button>
    <button class="facebook-btn" onclick="signInWithFacebook()">Login with Facebook</button>
    <button class="logout-btn" onclick="logoutUser()">Logout</button>
    <div id="userInfo">Not logged in</div>
  </div>

  <div id="gameSection">
    <h1>Car Game</h1>
    <p>Login successful. Ab yaha game show hoga.</p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      GoogleAuthProvider,
      FacebookAuthProvider,
      signInWithPopup,
      signOut,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_AUTH_DOMAIN",
      projectId: "YOUR_PROJECT_ID",
      appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const googleProvider = new GoogleAuthProvider();
    const facebookProvider = new FacebookAuthProvider();

    window.signInWithGoogle = async function () {
      try {
        const result = await signInWithPopup(auth, googleProvider);
        const user = result.user;
        document.getElementById("userInfo").innerText = "Google Login: " + user.displayName;
      } catch (error) {
        alert("Google login error: " + error.message);
      }
    };

    window.signInWithFacebook = async function () {
      try {
        const result = await signInWithPopup(auth, facebookProvider);
        const user = result.user;
        document.getElementById("userInfo").innerText = "Facebook Login: " + user.displayName;
      } catch (error) {
        alert("Facebook login error: " + error.message);
      }
    };

    window.logoutUser = async function () {
      try {
        await signOut(auth);
        document.getElementById("userInfo").innerText = "Not logged in";
        document.getElementById("gameSection").style.display = "none";
      } catch (error) {
        alert("Logout error: " + error.message);
      }
    };

    onAuthStateChanged(auth, (user) => {
      if (user) {
        document.getElementById("userInfo").innerText = "Welcome, " + user.displayName;
        document.getElementById("gameSection").style.display = "block";
      } else {
        document.getElementById("userInfo").innerText = "Not logged in";
        document.getElementById("gameSection").style.display = "none";
      }
    });
  </script>
</body>
</html>
